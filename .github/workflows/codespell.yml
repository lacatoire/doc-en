name: codespell

# Spell-check using codespell. Configuration lives in .github/codespell/.
# On pull requests, only files added/modified by the PR are scanned (fast).
# On push to master, the whole tree is scanned as a safety net.

on:
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  codespell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - run: pip install codespell

      - name: codespell
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            git fetch --depth=1 origin "$BASE" 2>/dev/null || true
            files=$(git diff --name-only --diff-filter=AMR "$BASE"..HEAD)
            if [ -z "$files" ]; then
              echo "No files added or modified by the PR."
              exit 0
            fi
            echo "$files" | xargs codespell --config .github/codespell/config
          else
            codespell --config .github/codespell/config
          fi
